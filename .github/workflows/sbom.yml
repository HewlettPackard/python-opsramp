name: Generate Security SBOM

on:
  release:
    types: [published]
  workflow_dispatch:  # Allows manual triggers for audit purposes

permissions:
  contents: write

jobs:
  build-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install --upgrade -r requirements.txt; fi
          if [ -f setup.py ]; then pip install .; fi

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          format: 'cyclonedx-json'
          output-file: 'sbom.cyclonedx.json'

      - name: Upload SBOM to Release Assets
        uses: softprops/action-gh-release@v3.0.0
        if: github.event_name == 'release'
        with:
          files: sbom.cyclonedx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
